<!DOCTYPE html>
<html>
<head>
    <title>Meine AR Seite</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin:0; overflow:hidden;">

<a-scene embedded arjs="debugUIEnabled: false">

    <a-assets>
        <a-asset-item id="balken" src="Balken.gltf"></a-asset-item>
    </a-assets>

    <!-- Marker 1: Hiro - Balken -->
    <a-marker preset="hiro">
        <a-entity
            gltf-model="#balken"
            position="0 0.5 0"
            scale="1 1 1"
            rotation="0 0 0">
        </a-entity>
    </a-marker>

    <!-- Marker 2: Kanji - Haus -->
    <a-marker preset="kanji">
        <!-- Wände -->
        <a-box position="0 0.5 0" width="1.5" height="0.8" depth="1" color="white"></a-box>
        <!-- Dach -->
        <a-cone position="0 1.2 0" radius-bottom="1" radius-top="0" height="0.7"
            color="red" segments-radial="4" rotation="0 45 0">
        </a-cone>
        <!-- Tür -->
        <a-box position="0 0.3 -0.51" width="0.2" height="0.4" depth="0.01" color="brown"></a-box>
        <!-- Fenster links -->
        <a-box position="-0.4 0.6 -0.51" width="0.25" height="0.25" depth="0.01" color="lightblue"></a-box>
        <!-- Fenster rechts -->
        <a-box position="0.4 0.6 -0.51" width="0.25" height="0.25" depth="0.01" color="lightblue"></a-box>
    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

</body>
</html>
